<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Converter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }
  .icon { font-size: 4rem; margin-bottom: 1rem; }
  h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  p { color: #9ca3af; max-width: 480px; line-height: 1.6; margin-bottom: 2rem; }
  a.button {
    display: inline-block;
    background: #3b82f6;
    color: #fff;
    padding: 0.85rem 2.5rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    text-decoration: none;
    margin-bottom: 2.5rem;
    transition: background 0.2s;
  }
  a.button:hover { background: #2563eb; }
  .note { font-size: 0.85rem; color: #6b7280; }
  a { color: #60a5fa; }
</style>
</head>
<body>
<div class="icon">⇄</div>
<h1>File Converter</h1>
<p>Convert audio, video, images, and documents directly from the macOS menu bar. Just copy files in Finder, click the icon, and pick a format.</p>
<a class="button" href="https://github.com/ufraaan/FileConverter/releases/latest">Download</a>
<div class="note">
  Requires macOS 14+ &middot; Open source on <a href="https://github.com/ufraaan/FileConverter">GitHub</a>
</div>
</body>
</html>
