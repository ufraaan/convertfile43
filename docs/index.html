<body>

<nav class="nav">

  </div>

<div class="page">
  <div class="frame" id="frame">
    <div class="frame-inner" id="frameInner">
      <img src="left.jpg" alt="convertfile43">
    </div>
  </div>

  <div class="content">
    <span class="hero-badge">macOS menu bar app</span>
    <h1>convertfile43.<br>No clicks spared.</h1>

    <a href="https://github.com/ufraaan/convertfile43/releases/latest" class="btn-download">
      <svg viewBox="0 0 24 24"><path d="M12 4v12M8 14l4 4 4-4M4 18v1a1 1 0 001 1h14a1 1 0 001-1v-1"/></svg>

  Free &amp; open source &middot; macOS 14+

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  const frame = document.getElementById('frame');
  const inner = document.getElementById('frameInner');
  const range = 12;

  frame.addEventListener('mousemove', (e) => {
    const rect = frame.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;

    gsap.to(inner, {
      x: -x * range,
      y: -y * range,
      duration: 1.2,
      ease: 'power2.out'
    });
  });

  frame.addEventListener('mouseleave', () => {
    gsap.to(inner, {
      x: 0,
      y: 0,
      duration: 1.0,
      ease: 'power2.out'
    });
  });
</script>
</body>
