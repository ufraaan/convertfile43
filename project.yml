name: convertfile43
options:
  bundleIdPrefix: com.fileconverter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SDKROOT: macosx
    CODE_SIGN_STYLE: Manual

targets:
  convertfile43:
    type: application
    platform: macOS
    sources:
      - path: FileConverter
        excludes:
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.convertfile43.app
        INFOPLIST_FILE: FileConverter/Info.plist
        CODE_SIGN_ENTITLEMENTS: FileConverter/Entitlements.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG"
        DEFINES_MODULE: YES
        PRODUCT_MODULE_NAME: convertfile43
    preBuildScripts:
      - name: "Bundle Binary Dependencies"
        basedOnDependencyAnalysis: false
        script: |
          RESOURCES_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp -f "$SRCROOT/Middleware/binaries/ffmpeg" "$RESOURCES_DIR/"
    dependencies: []

  FileConverterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FileConverterTests
    dependencies:
      - target: convertfile43
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.convertfile43.tests
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/convertfile43.app/Contents/MacOS/convertfile43"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  convertfile43:
    build:
      targets:
        convertfile43: all
        FileConverterTests: [build]
    run:
      config: Debug
      targets:
        convertfile43: all
    profile:
      config: Release
      targets:
        convertfile43: all
    analyze:
      config: Debug
      targets:
        convertfile43: all
    archive:
      config: Release
      targets:
        convertfile43: all
    test:
      config: Debug
      targets:
        - FileConverterTests
