name: FileConverter
options:
  bundleIdPrefix: com.fileconverter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SDKROOT: macosx
    CODE_SIGN_STYLE: Manual

targets:
  FileConverter:
    type: application
    platform: macOS
    sources:
      - path: FileConverter
        excludes:
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fileconverter.app
        INFOPLIST_FILE: FileConverter/Info.plist
        CODE_SIGN_ENTITLEMENTS: FileConverter/Entitlements.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG"
    preBuildScripts:
      - name: "Bundle Binary Dependencies"
        basedOnDependencyAnalysis: false
        script: |
          RESOURCES_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp -f "$SRCROOT/Middleware/binaries/ffmpeg" "$RESOURCES_DIR/"
          cp -f "$SRCROOT/Middleware/binaries/magick" "$RESOURCES_DIR/"
          cp -f "$SRCROOT/Middleware/binaries/gs" "$RESOURCES_DIR/"
    dependencies: []

schemes:
  FileConverter:
    build:
      targets:
        FileConverter: all
    run:
      config: Debug
      targets:
        FileConverter: all
    profile:
      config: Release
      targets:
        FileConverter: all
    analyze:
      config: Debug
      targets:
        FileConverter: all
    archive:
      config: Release
      targets:
        FileConverter: all
