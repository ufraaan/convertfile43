name: Rust

on:
  pull_request:
    paths: ["Middleware/rust-tool/**"]
  push:
    branches: [master, main]
    paths: ["Middleware/rust-tool/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Build
        run: cargo build --manifest-path Middleware/rust-tool/Cargo.toml

      - name: Lint
        run: cargo clippy --manifest-path Middleware/rust-tool/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path Middleware/rust-tool/Cargo.toml
