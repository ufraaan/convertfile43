name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          cd "$GITHUB_WORKSPACE"
          xcodegen generate

      - name: Install binary dependencies
        run: |
          brew install imagemagick ghostscript
          bash "$GITHUB_WORKSPACE/Middleware/Scripts/download-binaries.sh"

      - name: Build
        run: |
          cd "$GITHUB_WORKSPACE"
          xcodebuild -project convertfile43.xcodeproj \
            -scheme convertfile43 \
            -configuration Release \
            -derivedDataPath "Build" \
            -destination "generic/platform=macOS" \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Sign the app
        id: sign
        run: |
          APP="Build/Build/Products/Release/convertfile43.app"
          if security find-identity -v -p basic -p macappstore 2>/dev/null | grep -q "Developer ID Application"; then
            codesign --deep --force --verify --verbose --sign "Developer ID Application: ${{ secrets.DEVELOPER_NAME }}" "$APP"
            echo "signed=true" >> $GITHUB_OUTPUT
          else
            echo "signed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create DMG
        run: |
          APP="Build/Build/Products/Release/convertfile43.app"
          DMG="convertfile43-${{ env.VERSION }}.dmg"
          hdiutil create -volname "convertfile43 ${{ env.VERSION }}" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG"
          echo "DMG_PATH=$DMG" >> $GITHUB_ENV

      - name: Notarize DMG
        if: steps.sign.outputs.signed == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ env.DMG_PATH }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "${{ env.DMG_PATH }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
